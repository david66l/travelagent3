services:
  postgres:
    image: postgres:16-alpine
    container_name: travel_agent_postgres
    environment:
      POSTGRES_USER: travelagent
      POSTGRES_PASSWORD: travelagent123
      POSTGRES_DB: travel_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelagent -d travel_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travel_agent_network

  redis:
    image: redis:7-alpine
    container_name: travel_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travel_agent_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_agent_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://travelagent:travelagent123@postgres:5432/travel_agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - travel_agent_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_agent_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - travel_agent_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  travel_agent_network:
    driver: bridge
